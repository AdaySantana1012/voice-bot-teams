<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>Asistente de Siniestros</title>
    <script src="https://res.cdn.office.net/teams-js/2.22.0/js/MicrosoftTeams.min.js"></script>
    <script src="lib/adaptativecards.min.js"></script>
    <script src="lib/markdown-it.min.js"></script>
    <script src="js/voicebot-extensions.js"></script>
    <script src="js/app.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/style.css">
  </head>
  <body>
    <div class="app">
      <div class="header">
        <div class="logo"><span class="logo-mark">B</span></div>
        <div class="header-text">
          <h1>Asistente de Siniestros</h1>
          <span class="subtitle">Bankinter</span>
        </div>
      </div>
      <div class="status-bar" id="statusBar">
        <div class="status-dot"></div>
        <span id="statusText">Iniciando...</span>
      </div>
      <div class="chat" id="chat"></div>
      <div class="rec-indicator" id="recIndicator">
        <div class="rec-dot"></div>
        <span id="recTime">00:00</span
        ><span class="hint">Pulsa el micro para enviar</span>
      </div>
      <div class="file-preview" id="filePreview">
        <div class="file-icon">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
            />
            <polyline points="14 2 14 8 20 8" />
          </svg>
        </div>
        <div class="file-info">
          <div class="file-name" id="filePreviewName">documento.pdf</div>
          <div class="file-size" id="filePreviewSize">0 KB</div>
        </div>
        <button
          class="file-preview-remove"
          onclick="clearAttachedFile()"
          aria-label="Quitar archivo"
        >
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
      <div class="input-row">
        <div class="input-wrap">
          <button
            class="input-btn attach-btn"
            id="attachBtn"
            onclick="document.getElementById('fileInput').click()"
            disabled
            aria-label="Adjuntar PDF"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"
              />
            </svg>
          </button>
          <input
            class="text-input"
            id="textInput"
            type="text"
            placeholder="Escribe tu consulta..."
            onkeydown="if(event.key==='Enter') sendTextMessage()"
          />
          <button
            class="input-btn mic-btn"
            id="micBtn"
            onclick="toggleRecording()"
            disabled
            aria-label="Grabar audio"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z" />
              <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
              <line x1="12" y1="19" x2="12" y2="23" />
              <line x1="8" y1="23" x2="16" y2="23" />
            </svg>
          </button>
          <input
            type="file"
            id="fileInput"
            accept="application/pdf"
            style="display: none"
            onchange="onFilePicked(event)"
          />
        </div>
        <button
          class="send-btn"
          id="sendBtn"
          onclick="sendTextMessage()"
          disabled
        >
          Enviar
        </button>
      </div>
      <div class="debug" id="debugBox">
        <div
          class="debug-toggle"
          onclick="document.getElementById('debugBox').classList.toggle('open')"
        >
          Debug
        </div>
        <div class="debug-content">
          sso: <span id="dbSSO">-</span><br />user: <span id="dbUser">-</span
          ><br />dlUserId: <span id="dbDlUser">-</span><br />conversationId:
          <span id="dbConv">-</span><br />dlToken: <span id="dbToken">-</span>
        </div>
      </div>
    </div>
  </body>
</html>
