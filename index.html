<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Asistente de Siniestros</title>
  <script src="https://res.cdn.office.net/teams-js/2.22.0/js/MicrosoftTeams.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange: #FF8D30;
      --orange-soft: #FFE7D2;
      --orange-dark: #E5731A;
      --black: #212425;
      --white: #FFFFFF;
      --cyan: #B7F0F0;
      --cyan-soft: #E5F8F8;
      --yellow: #FED227;
      --bg: #FAFAFA;
      --surface: #FFFFFF;
      --border: #E8E8E8;
      --text: #212425;
      --muted: #6B6F71;
      --recording: #E5333D;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
    body { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 20px 16px; gap: 14px; }
    body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 70% 40% at 0% 0%, rgba(255, 141, 48, 0.06) 0%, transparent 50%), radial-gradient(ellipse 50% 50% at 100% 100%, rgba(183, 240, 240, 0.18) 0%, transparent 60%); pointer-events: none; }
    .app { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 14px; position: relative; z-index: 1; }
    .header { display: flex; align-items: center; gap: 12px; padding: 4px 2px; }
    .logo { width: 38px; height: 38px; background: var(--black); border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .logo-mark { font-family: 'Inter', sans-serif; font-weight: 800; color: var(--orange); font-size: 22px; line-height: 1; letter-spacing: -0.02em; }
    .header-text { display: flex; flex-direction: column; gap: 1px; }
    .header h1 { font-size: 17px; font-weight: 700; color: var(--black); letter-spacing: -0.01em; line-height: 1.2; }
    .header .subtitle { font-size: 12px; color: var(--muted); font-weight: 500; }
    .status-bar { display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 8px 12px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); transition: all 0.3s; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); transition: all 0.3s; }
    .status-bar.ok .status-dot { background: #1FB36C; box-shadow: 0 0 8px rgba(31, 179, 108, 0.5); }
    .status-bar.ok { border-color: rgba(31, 179, 108, 0.3); color: var(--text); }
    .status-bar.thinking .status-dot { background: var(--orange); animation: pulse 1s infinite; }
    .status-bar.thinking { border-color: rgba(255, 141, 48, 0.3); }
    .status-bar.error .status-dot { background: var(--recording); }
    .status-bar.error { border-color: rgba(229, 51, 61, 0.3); color: var(--text); }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .chat { width: 100%; display: flex; flex-direction: column; gap: 12px; height: 380px; overflow-y: auto; padding: 4px 2px 4px 2px; }
    .chat::-webkit-scrollbar { width: 4px; }
    .chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .chat::-webkit-scrollbar-thumb:hover { background: var(--muted); }
    .msg { display: flex; flex-direction: column; gap: 4px; animation: slide-in 0.3s ease; }
    @keyframes slide-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .msg.user { align-items: flex-end; }
    .msg.bot { align-items: flex-start; }
    .msg-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; padding: 0 4px; }
    .msg-bubble { max-width: 85%; padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.5; box-shadow: 0 1px 2px rgba(33, 36, 37, 0.04); }
    .msg.user .msg-bubble { background: var(--orange); color: var(--white); border-bottom-right-radius: 4px; font-weight: 500; }
    .msg.bot .msg-bubble { background: var(--surface); border: 1px solid var(--border); color: var(--text); border-bottom-left-radius: 4px; }
    .thinking-bubble { display: flex; gap: 4px; align-items: center; padding: 12px 16px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--orange); animation: bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
    .audio-bubble { display: flex; flex-direction: column; gap: 6px; padding: 10px 12px; min-width: 240px; background: var(--orange); color: var(--white); }
    .audio-bubble audio { width: 100%; height: 32px; outline: none; }
    .audio-bubble audio::-webkit-media-controls-panel { background: var(--white); }
    .audio-transcript { font-size: 12px; line-height: 1.4; opacity: 0.95; font-style: italic; padding: 0 4px; color: var(--white); }
    .audio-transcript.loading { opacity: 0.7; display: flex; align-items: center; gap: 6px; }
    .audio-transcript.loading::before { content: ''; width: 8px; height: 8px; border-radius: 50%; background: var(--yellow); animation: pulse 0.8s infinite; }
    .input-row { display: flex; gap: 8px; width: 100%; align-items: stretch; }
    .input-wrap { flex: 1; position: relative; display: flex; align-items: center; }
    .text-input { flex: 1; width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 48px 12px 14px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
    .text-input:focus { border-color: var(--orange); box-shadow: 0 0 0 3px rgba(255, 141, 48, 0.12); }
    .text-input::placeholder { color: var(--muted); }
    .text-input:disabled { opacity: 0.5; background: #F5F5F5; }
    .mic-btn { position: absolute; right: 6px; top: 50%; transform: translateY(-50%); width: 34px; height: 34px; background: transparent; border: none; border-radius: 8px; color: var(--orange); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; }
    .mic-btn:hover { background: var(--orange-soft); }
    .mic-btn:active { transform: translateY(-50%) scale(0.92); }
    .mic-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .mic-btn svg { width: 19px; height: 19px; }
    .mic-btn.recording { background: var(--recording); color: var(--white); animation: rec-pulse 1.2s infinite; }
    @keyframes rec-pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(229, 51, 61, 0.5); } 50% { box-shadow: 0 0 0 8px rgba(229, 51, 61, 0); } }
    .send-btn { background: var(--black); color: var(--white); border: none; border-radius: 10px; padding: 0 18px; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; white-space: nowrap; letter-spacing: -0.01em; }
    .send-btn:hover { background: #000; }
    .send-btn:active { transform: scale(0.96); }
    .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .rec-indicator { display: none; align-items: center; gap: 8px; background: var(--surface); border: 1px solid rgba(229, 51, 61, 0.25); border-radius: 10px; padding: 8px 12px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--recording); }
    .rec-indicator.active { display: flex; }
    .rec-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--recording); animation: pulse 1s infinite; }
    .rec-indicator span.hint { color: var(--muted); margin-left: auto; font-family: 'Inter', sans-serif; font-size: 11px; }
    .debug { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); line-height: 1.7; word-break: break-all; }
    .debug span { color: var(--text); }
    .debug-toggle { cursor: pointer; user-select: none; display: flex; align-items: center; justify-content: space-between; font-family: 'Inter', sans-serif; font-weight: 600; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
    .debug-content { display: none; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
    .debug.open .debug-content { display: block; }
    .debug-toggle::after { content: '+'; font-size: 14px; line-height: 1; }
    .debug.open .debug-toggle::after { content: '−'; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="logo"><span class="logo-mark">B</span></div>
      <div class="header-text">
        <h1>Asistente de Siniestros</h1>
        <span class="subtitle">Bankinter</span>
      </div>
    </div>

    <div class="status-bar" id="statusBar">
      <div class="status-dot"></div>
      <span id="statusText">Iniciando...</span>
    </div>

    <div class="chat" id="chat"></div>

    <div class="rec-indicator" id="recIndicator">
      <div class="rec-dot"></div>
      <span id="recTime">00:00</span>
      <span class="hint">Pulsa el micro para enviar</span>
    </div>

    <div class="input-row">
      <div class="input-wrap">
        <input class="text-input" id="textInput" type="text" placeholder="Escribe tu consulta..." onkeydown="if(event.key==='Enter') sendTextMessage()" />
        <button class="mic-btn" id="micBtn" onclick="toggleRecording()" disabled aria-label="Grabar audio">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </button>
      </div>
      <button class="send-btn" id="sendBtn" onclick="sendTextMessage()" disabled>Enviar</button>
    </div>

    <div class="debug" id="debugBox">
      <div class="debug-toggle" onclick="document.getElementById('debugBox').classList.toggle('open')">
        Debug
      </div>
      <div class="debug-content">
        sso: <span id="dbSSO">-</span><br>
        user: <span id="dbUser">-</span><br>
        dlUserId: <span id="dbDlUser">-</span><br>
        conversationId: <span id="dbConv">-</span><br>
        dlToken: <span id="dbToken">-</span>
      </div>
    </div>
  </div>

  <script>
    // ====== CONFIG ======
    const APP_ID = '4a693834-2aa8-478e-a086-98d7de9ade7e';
    const APP_DOMAIN = 'voicebot.compracamper.com';
    const RESOURCE = `api://${APP_DOMAIN}/${APP_ID}`;
    const PROXY_BASE = 'https://voicebot-proxy.azurewebsites.net/api';
    const TOKEN_URL = `${PROXY_BASE}/token`;
    const TRANSCRIBE_URL = `${PROXY_BASE}/transcribe`;
    const DIRECTLINE_BASE = 'https://europe.directline.botframework.com/v3/directline';

    // ====== STATE ======
    let ssoToken = null;
    let dlToken = null;
    let conversationId = null;
    let watermark = null;
    let userId = null;
    let dlUserId = null;
    let userName = 'Usuario';
    let polling = false;     // controla el loop de polling continuo

    let mediaRecorder = null;
    let audioChunks = [];
    let recordingStream = null;
    let recordStart = 0;
    let recordTimer = null;

    async function init() {
      try {
        await microsoftTeams.app.initialize();
        setStatus('thinking', 'Obteniendo credenciales...');

        ssoToken = await new Promise((resolve, reject) => {
          microsoftTeams.authentication.getAuthToken({
            resources: [RESOURCE],
            successCallback: resolve,
            failureCallback: (err) => reject(new Error(typeof err === 'string' ? err : JSON.stringify(err)))
          });
        });
        document.getElementById('dbSSO').textContent = ssoToken.substring(0, 20) + '...';

        try {
          const payload = JSON.parse(atob(ssoToken.split('.')[1]));
          userId = payload.oid || payload.sub;
          dlUserId = `dl_${userId}`;
          userName = payload.name || payload.preferred_username || 'Usuario';
          document.getElementById('dbUser').textContent = (payload.preferred_username || payload.upn || userId || 'unknown');
          document.getElementById('dbDlUser').textContent = dlUserId;
        } catch (_) {}

        setStatus('thinking', 'Conectando con el asistente...');
        const tokenRes = await fetch(TOKEN_URL, {
          method: 'GET',
          headers: { 'Authorization': `Bearer ${ssoToken}` }
        });
        if (!tokenRes.ok) {
          const err = await tokenRes.text();
          setStatus('error', `Error de conexión (${tokenRes.status})`);
          addBotMessage(`No se pudo establecer la conexión. ${err}`);
          return;
        }
        const tokenData = await tokenRes.json();
        dlToken = tokenData.token;
        document.getElementById('dbToken').textContent = dlToken.substring(0, 20) + '...';

        const convRes = await fetch(`${DIRECTLINE_BASE}/conversations`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${dlToken}` }
        });
        if (!convRes.ok) {
          const err = await convRes.text();
          setStatus('error', `Error iniciando conversación`);
          addBotMessage(err);
          return;
        }
        const convData = await convRes.json();
        conversationId = convData.conversationId;
        document.getElementById('dbConv').textContent = conversationId;

        setStatus('ok', 'Conectado');
        document.getElementById('sendBtn').disabled = false;
        document.getElementById('micBtn').disabled = false;

        // Arranca el polling continuo: a partir de ahora cualquier mensaje del bot
        // (incluido el Greeting) aparecerá en el chat.
        startContinuousPolling();

        // Dispara el system topic "Conversation Start" del agente
        await sendConversationUpdate();

      } catch (e) {
        setStatus('error', 'Error de inicialización');
        addBotMessage(e.message);
      }
    }

    // Manda al bot los eventos que pueden disparar su Greeting
    async function sendConversationUpdate() {
      const headers = {
        'Authorization': `Bearer ${dlToken}`,
        'Content-Type': 'application/json'
      };
      const url = `${DIRECTLINE_BASE}/conversations/${conversationId}/activities`;

      // 1) conversationUpdate clásico (Bot Framework)
      try {
        await fetch(url, {
          method: 'POST',
          headers,
          body: JSON.stringify({
            type: 'conversationUpdate',
            from: { id: dlUserId, name: userName },
            membersAdded: [{ id: dlUserId, name: userName }]
          })
        });
      } catch (e) {
        console.warn('conversationUpdate falló:', e);
      }

      // 2) Event "startConversation" (lo que Copilot Studio suele escuchar)
      try {
        await fetch(url, {
          method: 'POST',
          headers,
          body: JSON.stringify({
            type: 'event',
            name: 'startConversation',
            from: { id: dlUserId, name: userName }
          })
        });
      } catch (e) {
        console.warn('event startConversation falló:', e);
      }
    }

    async function sendTextMessage() {
      const input = document.getElementById('textInput');
      const text = input.value.trim();
      if (!text || !conversationId) return;
      input.value = '';
      addUserTextMessage(text);
      await sendToBot(text);
    }

    async function toggleRecording() {
      if (!conversationId) return;
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        stopRecording();
      } else {
        await startRecording();
      }
    }

    async function startRecording() {
      try {
        recordingStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const candidates = ['audio/webm;codecs=opus', 'audio/webm', 'audio/mp4', 'audio/ogg;codecs=opus'];
        const mimeType = candidates.find(t => MediaRecorder.isTypeSupported(t)) || '';
        mediaRecorder = new MediaRecorder(recordingStream, mimeType ? { mimeType } : undefined);
        audioChunks = [];

        mediaRecorder.addEventListener('dataavailable', e => {
          if (e.data.size > 0) audioChunks.push(e.data);
        });

        mediaRecorder.addEventListener('stop', async () => {
          const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
          recordingStream.getTracks().forEach(t => t.stop());
          recordingStream = null;
          await handleAudioBlob(blob);
        });

        mediaRecorder.start();
        recordStart = Date.now();
        document.getElementById('micBtn').classList.add('recording');
        document.getElementById('recIndicator').classList.add('active');
        document.getElementById('textInput').disabled = true;
        document.getElementById('sendBtn').disabled = true;
        recordTimer = setInterval(() => {
          const s = Math.floor((Date.now() - recordStart) / 1000);
          const mm = String(Math.floor(s / 60)).padStart(2, '0');
          const ss = String(s % 60).padStart(2, '0');
          document.getElementById('recTime').textContent = `${mm}:${ss}`;
        }, 250);
      } catch (e) {
        addBotMessage('No se pudo acceder al micrófono: ' + e.message);
      }
    }

    function stopRecording() {
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
      }
      clearInterval(recordTimer);
      document.getElementById('micBtn').classList.remove('recording');
      document.getElementById('recIndicator').classList.remove('active');
      document.getElementById('textInput').disabled = false;
      document.getElementById('sendBtn').disabled = false;
      document.getElementById('recTime').textContent = '00:00';
    }

    async function handleAudioBlob(blob) {
      const audioUrl = URL.createObjectURL(blob);
      const transcriptEl = addUserAudioMessage(audioUrl);

      try {
        const form = new FormData();
        form.append('audio', blob, 'recording.webm');

        const res = await fetch(TRANSCRIBE_URL, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${ssoToken}` },
          body: form
        });

        if (!res.ok) {
          transcriptEl.classList.remove('loading');
          transcriptEl.textContent = 'No se pudo transcribir el audio.';
          return;
        }

        const data = await res.json();
        const text = (data.text || '').trim();
        transcriptEl.classList.remove('loading');
        transcriptEl.textContent = text || '(no se detectó voz)';

        if (text) {
          await sendToBot(text);
        }
      } catch (e) {
        transcriptEl.classList.remove('loading');
        transcriptEl.textContent = 'Error: ' + e.message;
      }
    }

    async function sendToBot(text) {
      try {
        await fetch(`${DIRECTLINE_BASE}/conversations/${conversationId}/activities`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${dlToken}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            type: 'message',
            from: { id: dlUserId, name: userName },
            text: text
          })
        });
        setStatus('thinking', 'Procesando consulta...');
        showThinking();
      } catch (e) {
        addBotMessage('Error enviando: ' + e.message);
      }
    }

    // Polling continuo: corre indefinidamente desde init() y enseña cualquier
    // mensaje que llegue del bot, sin depender de que el usuario haya escrito antes.
    async function startContinuousPolling() {
      if (polling) return;
      polling = true;
      while (polling) {
        try {
          const url = `${DIRECTLINE_BASE}/conversations/${conversationId}/activities` +
            (watermark ? `?watermark=${watermark}` : '');
          const res = await fetch(url, { headers: { 'Authorization': `Bearer ${dlToken}` } });
          if (res.ok) {
            const data = await res.json();
            watermark = data.watermark;
            const botMsgs = (data.activities || []).filter(a =>
              a.type === 'message' &&
              a.from &&
              a.from.id !== dlUserId &&
              a.from.id !== userId &&
              a.from.id !== 'user1'
            );
            if (botMsgs.length > 0) {
              hideThinking();
              botMsgs.forEach(m => addBotMessage(m.text));
              setStatus('ok', 'Conectado');
            }
          }
        } catch (e) {
          // ignora errores transitorios
        }
        await sleep(1500);
      }
    }

    function setStatus(type, text) {
      document.getElementById('statusBar').className = 'status-bar ' + type;
      document.getElementById('statusText').textContent = text;
    }
    function addUserTextMessage(text) {
      const chat = document.getElementById('chat');
      const msg = document.createElement('div');
      msg.className = 'msg user';
      msg.innerHTML = `<div class="msg-label">Tú</div><div class="msg-bubble"></div>`;
      msg.querySelector('.msg-bubble').textContent = text;
      chat.appendChild(msg); chat.scrollTop = chat.scrollHeight;
    }
    function addUserAudioMessage(audioUrl) {
      const chat = document.getElementById('chat');
      const msg = document.createElement('div');
      msg.className = 'msg user';
      msg.innerHTML = `
        <div class="msg-label">Tú</div>
        <div class="msg-bubble audio-bubble">
          <audio controls src="${audioUrl}"></audio>
          <div class="audio-transcript loading">Transcribiendo...</div>
        </div>
      `;
      chat.appendChild(msg); chat.scrollTop = chat.scrollHeight;
      return msg.querySelector('.audio-transcript');
    }
    function addBotMessage(text) {
      const chat = document.getElementById('chat');
      const msg = document.createElement('div');
      msg.className = 'msg bot';
      msg.innerHTML = `<div class="msg-label">Asistente</div><div class="msg-bubble"></div>`;
      msg.querySelector('.msg-bubble').textContent = text || '...';
      chat.appendChild(msg); chat.scrollTop = chat.scrollHeight;
    }
    function showThinking() {
      // Solo añade thinking si no hay ya uno
      if (document.getElementById('thinking')) return;
      const chat = document.getElementById('chat');
      const t = document.createElement('div');
      t.className = 'msg bot'; t.id = 'thinking';
      t.innerHTML = `<div class="msg-label">Asistente</div><div class="msg-bubble thinking-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
      chat.appendChild(t); chat.scrollTop = chat.scrollHeight;
    }
    function hideThinking() { const t = document.getElementById('thinking'); if (t) t.remove(); }
    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    init();
  </script>
</body>
</html>
